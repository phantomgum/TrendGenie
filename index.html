<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6d28d9;
            --primary-hover: #5b21b6;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin: 0;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 999px;
            border: 1px solid var(--surface);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(109, 40, 217, 0.3);
        }

        button {
            padding: 1rem 2rem;
            border-radius: 999px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Loading spinner */
        .loader {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .loader::after {
            content: '';
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .card {
            background-color: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: none;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card.visible {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }

        .discover-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .discover-grid.visible {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .discover-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .card h2 {
            margin-top: 0;
            color: white;
        }

        .category {
            margin-bottom: 1.5rem;
        }

        .category-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .category-content {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }

        .error {
            color: #ef4444;
            text-align: center;
            margin-top: 1rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 10px;
            word-wrap: break-word;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .tab-btn {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 999px;
            padding: 0.75rem 2rem;
            margin: 0;
            box-shadow: none;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInTab 0.4s ease;
        }

        @keyframes fadeInTab {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Idea Generator</h1>
            <p>Tell us what you want to learn, get a project to build.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="discoverTab">Discovery</button>
            <button class="tab-btn" data-target="learnTab">Learn</button>
        </div>

        <div id="discoverTab" class="tab-content active">
            <section id="discoverySection" style="margin-bottom: 4rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="margin: 0; background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Discover what to build</h2>
                    <button id="refreshDiscoverBtn" type="button">Refresh ideas</button>
                </div>
    
                <div class="loader" id="discoverLoader"></div>
                <div class="error" id="discoverErrorMsg"></div>
    
                <div class="discover-grid" id="discoverCards"></div>
            </section>
        </div>

        <div id="learnTab" class="tab-content">
            <div style="max-width: 600px; margin: 0 auto;">
                <form id="ideaForm" class="input-group">
                <input type="text" id="goalInput" placeholder="e.g. Machine Learning, React, Go..." required>
                <button type="submit">Generate</button>
            </form>

            <div class="loader" id="loader"></div>
            <div class="error" id="errorMsg"></div>

            <div class="card" id="ideaCard">
                <h2 id="cardTitle"></h2>
                <p id="cardTagline"
                    style="font-style: italic; margin-bottom: 1.5rem; color: var(--primary); font-weight: 600; font-size: 1.1rem; line-height: 1.4;">
                </p>

                <div class="category">
                    <div class="category-title">Description</div>
                    <p class="category-content" id="cardDesc"></p>
                </div>

                <div class="category">
                    <div class="category-title">Why This Works</div>
                    <p class="category-content" id="cardWhyWorks"></p>
                </div>

                <div class="category">
                    <div class="category-title">Core Features</div>
                    <ul class="category-content" id="cardFeatures" style="margin-top: 0; padding-left: 1.2rem;"></ul>
                </div>

                <div class="category">
                    <div class="category-title">What you'll learn</div>
                    <ul class="category-content" id="cardLearn" style="margin-top: 0; padding-left: 1.2rem;"></ul>
                </div>

                <div class="category">
                    <div class="category-title">Tools & Tech</div>
                    <p class="category-content" id="cardTools"></p>
                </div>

                <div class="category">
                    <div class="category-title">First Step</div>
                    <p class="category-content" id="cardFirstStep"></p>
                </div>

                <div class="category">
                    <div class="category-title">First Step</div>
                    <p class="category-content" id="cardFirstStep"></p>
                </div>

                <div class="category">
                    <div class="category-title">Estimated Time</div>
                    <p class="category-content" id="cardTime"></p>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        // Tab switching logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });
        const form = document.getElementById('ideaForm');
        const input = document.getElementById('goalInput');
        const btn = form.querySelector('button');
        const loader = document.getElementById('loader');
        const card = document.getElementById('ideaCard');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const goal = input.value.trim();
            if (!goal) return;

            // Reset UI
            card.classList.remove('visible');
            setTimeout(() => { card.style.display = 'none'; }, 300); // match transition
            errorMsg.style.display = 'none';
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('/generate-idea', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ goal })
                });

                if (!response.ok) {
                    const errInfo = await response.json();
                    throw new Error(errInfo.detail || 'Something went wrong');
                }

                const data = await response.json();

                // Populate card
                document.getElementById('cardTitle').textContent = data.title;
                document.getElementById('cardTagline').textContent = data.tagline;
                document.getElementById('cardDesc').textContent = data.description;
                document.getElementById('cardWhyWorks').textContent = data.why_this_works;
                document.getElementById('cardFeatures').innerHTML = data.core_features.map(f => `<li>${f}</li>`).join('');
                document.getElementById('cardLearn').innerHTML = data.what_youll_learn.map(l => `<li>${l}</li>`).join('');
                document.getElementById('cardTools').textContent = data.tools_and_tech.join(', ');
                document.getElementById('cardFirstStep').textContent = data.first_step;
                document.getElementById('cardTime').textContent = data.estimated_time;

                // Show card
                card.style.display = 'block';
                // Trigger reflow
                void card.offsetWidth;
                card.classList.add('visible');

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });

        // Discovery Section Logic
        const discoverBtn = document.getElementById('refreshDiscoverBtn');
        const discoverLoader = document.getElementById('discoverLoader');
        const discoverErrorMsg = document.getElementById('discoverErrorMsg');
        const discoverCardsContainer = document.getElementById('discoverCards');

        discoverBtn.addEventListener('click', async () => {
            discoverBtn.disabled = true;
            discoverLoader.style.display = 'block';
            discoverErrorMsg.style.display = 'none';
            discoverCardsContainer.classList.remove('visible');
            discoverCardsContainer.innerHTML = '';

            try {
                const response = await fetch('/discover');
                if (!response.ok) {
                    const errInfo = await response.json();
                    throw new Error(errInfo.detail || 'Something went wrong fetching discovery ideas');
                }

                let data = await response.json();

                // Allow array or object array wrappers to be safe
                const ideas = Array.isArray(data) ? data : (data.ideas || []);

                ideas.forEach(idea => {
                    const div = document.createElement('div');
                    div.className = 'card visible'; // reusing card classes
                    div.style.display = 'block';
                    div.style.transform = 'none';
                    div.style.opacity = '1';

                    div.innerHTML = `
                        <h3 style="margin-top: 0; color: white;">${idea.title}</h3>
                        <p style="font-style: italic; margin-bottom: 1.5rem; color: var(--primary); font-weight: 600; font-size: 1.1rem; line-height: 1.4;">
                            ${idea.tagline}
                        </p>
                        
                        <div class="category">
                            <div class="category-title">Inspired By</div>
                            <p class="category-content">${idea.inspired_by || 'Trending tech'}</p>
                        </div>
                        
                        <div class="category">
                            <div class="category-title">Description</div>
                            <p class="category-content">${idea.description}</p>
                        </div>

                        <div class="category">
                            <div class="category-title">What you'll learn</div>
                            <ul class="category-content" style="margin-top: 0; padding-left: 1.2rem;">
                                ${idea.what_youll_learn.map(l => `<li>${l}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="category">
                            <div class="category-title">First Step</div>
                            <p class="category-content">${idea.first_step}</p>
                        </div>
                    `;
                    discoverCardsContainer.appendChild(div);
                });

                setTimeout(() => {
                    discoverCardsContainer.classList.add('visible');
                }, 50);

            } catch (error) {
                discoverErrorMsg.textContent = error.message;
                discoverErrorMsg.style.display = 'block';
            } finally {
                discoverBtn.disabled = false;
                discoverLoader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
